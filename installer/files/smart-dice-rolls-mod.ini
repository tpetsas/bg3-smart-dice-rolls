[display]
; Normalized position (0.0-1.0) of the dice roll button within the game window.
; Default values are calibrated for a 16:9 display. If you are on mouse & keyboard
; and the click lands off-target, adjust these until it hits the dice button.
; Advantage/disadvantage X is derived automatically (click_norm_x - 0.03).
click_norm_x=0.50
click_norm_y=0.43
